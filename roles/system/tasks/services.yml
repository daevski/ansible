---
- name: Enable and start system services
  service:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - bluetooth
    - docker
    - NetworkManager
    - nordvpnd
    - sddm

- name: Enable and start user services
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
    scope: user
  loop:
    - hypridle
    - pipewire
    - pipewire-pulse
    - syncthing
    - wireplumber
  become: yes
  become_user: "{{ ansible_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ user_uid }}"
