---
- name: Create sddm.conf.d directory
  file:
    path: /etc/sddm.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy sddm theme config
  copy:
    src: sddm.conf.d/theme.conf
    dest: /etc/sddm.conf.d/theme.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart sddm

- name: Copy hyprlock-sddm-theme
  copy:
    src: sddm-themes/hyprlock-sddm-theme/
    dest: /usr/share/sddm/themes/hyprlock-sddm-theme/
    owner: root
    group: root
    mode: '0644'
  notify: restart sddm

- name: Copy sudoers timeout rule
  copy:
    src: sudoers.d/david-timeout
    dest: /etc/sudoers.d/david-timeout
    owner: root
    group: root
    mode: '0440'
    validate: visudo -cf %s

- name: Enable locale in locale.gen
  lineinfile:
    path: /etc/locale.gen
    regexp: "^#?{{ system_locale }}"
    line: "{{ system_locale }} UTF-8"
  notify: generate locale

- name: Set system locale
  copy:
    content: "LANG={{ system_locale }}\n"
    dest: /etc/locale.conf

- name: Set timezone
  file:
    src: "/usr/share/zoneinfo/{{ system_timezone }}"
    dest: /etc/localtime
    state: link
    force: yes

- name: Set hostname
  copy:
    content: "{{ system_hostname }}\n"
    dest: /etc/hostname
    owner: root
    group: root
    mode: '0644'
  when: system_hostname | length > 0

- name: Update /etc/hosts with hostname
  lineinfile:
    path: /etc/hosts
    regexp: "^127\\.0\\.1\\.1"
    line: "127.0.1.1 {{ system_hostname }}"
    state: present
  when: system_hostname | length > 0

- name: Install ssh-agent systemd user service
  copy:
    src: systemd/user/ssh-agent.service
    dest: /home/{{ ansible_user }}/.config/systemd/user/ssh-agent.service
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  become: yes
  become_user: "{{ ansible_user }}"
  when: ansible_facts['service_mgr'] == 'systemd'

- name: Export SSH_AUTH_SOCK in .zshrc
  lineinfile:
    path: /home/{{ ansible_user }}/.zshrc
    line: 'export SSH_AUTH_SOCK="$XDG_RUNTIME_DIR/ssh-agent.socket"'
    regexp: 'SSH_AUTH_SOCK'
    create: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  become: yes
  become_user: "{{ ansible_user }}"

- name: Check if docker group exists
  command: getent group docker
  register: docker_group
  failed_when: false
  changed_when: false
  check_mode: no

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  when: docker_group.rc == 0

- name: Set default shell to zsh
  user:
    name: "{{ ansible_user }}"
    shell: /usr/bin/zsh
