---
- name: Allow pacman without password for AUR builds
  copy:
    content: "{{ ansible_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman\n"
    dest: /etc/sudoers.d/ansible-pacman-nopasswd
    owner: root
    group: root
    mode: '0440'
    validate: visudo -cf %s

- name: Check for Artix Linux
  stat:
    path: /etc/artix-release
  register: artix_release
  check_mode: no

- include_tasks: artix-arch-repos.yml
  when: artix_release.stat.exists

- import_tasks: pacman.yml
- import_tasks: aur.yml

- name: Remove temporary pacman NOPASSWD sudoers rule
  file:
    path: /etc/sudoers.d/ansible-pacman-nopasswd
    state: absent
